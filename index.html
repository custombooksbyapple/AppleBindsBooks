<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple's Custom Books</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden static form so Netlify's build-time crawler can detect and register it.
         This form is never shown to visitors — the real form lives in React and
         submits to Netlify by POSTing to "/" with matching field names. -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="book" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/main.jsx"></script>
  </body>
</html>
